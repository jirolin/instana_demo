---
# Instana Event Routing Rulebook
# ibm.instana コレクションの instana_webhook ソースを使用して
# Instana からのイベントを受信し、条件に応じて対処する
#
# Instana Webhook ペイロード構造 (実測値):
#   共通フィールド:
#     event.payload.issue.id          — イベントID
#     event.payload.issue.text        — メッセージ本文
#     event.payload.issue.type        — "issue" / "monitoringIssue" / "presence"
#     event.payload.issue.entityLabel — エンティティ名
#     event.payload.issue.fqdn        — ホストFQDN
#     event.payload.issue.entity      — エンティティ種別
#     event.payload.issue.service     — サービス名 ("not available" の場合あり)
#
#   issue/monitoringIssue 固有:
#     event.payload.issue.severity    — 数値 (5=warning, 10=critical)
#     event.payload.issue.state       — "OPEN" / "CLOSED"
#     event.payload.issue.suggestion  — Instana推奨対処
#
#   presence 固有 (プロセスオフライン等):
#     event.payload.issue.text        — "offline"
#     ※ severity, state フィールドなし
#
# ルール評価順: 上から順に評価、最初にマッチしたルールが実行される

- name: Instana Event Driven Automation
  hosts: all
  sources:
    - ibm.instana.instana_webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    # --- CLOSED イベントは無視 (state が定義されていて CLOSED なら何もしない) ---
    - name: Skip closed events
      condition: >
        event.payload.issue is defined
        and event.payload.issue.state is defined
        and event.payload.issue.state == "CLOSED"
      action:
        none: {}

    # --- Standard: プロセスダウン / オフライン → 即時再起動 ---
    # presence イベント (state なし) も issue イベント (state=OPEN) もマッチ
    - name: Process down - restart service
      condition: >
        event.payload.issue is defined
        and (
          event.payload.issue.text is match(".*process.*down.*", ignorecase=true)
          or event.payload.issue.text is match(".*offline.*", ignorecase=true)
          or event.payload.issue.text is match(".*not responding.*", ignorecase=true)
          or event.payload.issue.text is match(".*abnormal termination.*", ignorecase=true)
        )
      action:
        run_job_template:
          name: restart-service
          organization: Default
          job_args:
            extra_vars:
              target_host: "{{ event.payload.issue.fqdn }}"
              entity_label: "{{ event.payload.issue.entityLabel }}"
              service_name: "{{ event.payload.issue.service }}"
              event_id: "{{ event.payload.issue.id }}"
              event_text: "{{ event.payload.issue.text }}"

    # --- Standard: ディスク使用率高 → クリーンアップ ---
    - name: Disk usage high - cleanup
      condition: >
        event.payload.issue is defined
        and event.payload.issue.text is match(".*disk.*usage.*", ignorecase=true)
      action:
        run_job_template:
          name: disk-cleanup
          organization: Default
          job_args:
            extra_vars:
              target_host: "{{ event.payload.issue.fqdn }}"
              event_text: "{{ event.payload.issue.text }}"

    # --- AI-Driven: Warning (severity=5) + 性能系 → AI分析・自動対処 ---
    - name: Performance degradation - AI analysis (auto)
      condition: >
        event.payload.issue is defined
        and event.payload.issue.severity is defined
        and event.payload.issue.severity == 5
        and (
          event.payload.issue.text is match(".*erroneous call rate.*", ignorecase=true)
          or event.payload.issue.text is match(".*response time.*", ignorecase=true)
          or event.payload.issue.text is match(".*high latency.*", ignorecase=true)
          or event.payload.issue.text is match(".*memory.*usage.*", ignorecase=true)
          or event.payload.issue.text is match(".*system load.*", ignorecase=true)
          or event.payload.issue.text is match(".*garbage collection.*", ignorecase=true)
          or event.payload.issue.text is match(".*queue.*", ignorecase=true)
        )
      action:
        run_job_template:
          name: ai-analyze-and-remediate
          organization: Default
          job_args:
            extra_vars:
              event_id: "{{ event.payload.issue.id }}"
              event_text: "{{ event.payload.issue.text }}"
              event_severity: "{{ event.payload.issue.severity }}"
              event_entity: "{{ event.payload.issue.entityLabel }}"
              event_fqdn: "{{ event.payload.issue.fqdn }}"
              event_service: "{{ event.payload.issue.service }}"
              analysis_mode: "auto"

    # --- AI-Driven: Critical (severity=10) → AI分析・承認待ち ---
    - name: Critical event - AI analysis (approval required)
      condition: >
        event.payload.issue is defined
        and event.payload.issue.severity is defined
        and event.payload.issue.severity == 10
      action:
        run_job_template:
          name: ai-analyze-and-remediate
          organization: Default
          job_args:
            extra_vars:
              event_id: "{{ event.payload.issue.id }}"
              event_text: "{{ event.payload.issue.text }}"
              event_severity: "{{ event.payload.issue.severity }}"
              event_entity: "{{ event.payload.issue.entityLabel }}"
              event_fqdn: "{{ event.payload.issue.fqdn }}"
              event_service: "{{ event.payload.issue.service }}"
              analysis_mode: "approval"

    # --- Catch-all: 上記ルールにマッチしなかったイベントをログ出力 ---
    - name: Log unmatched Instana events
      condition: event.payload is defined
      action:
        run_job_template:
          name: log-event
          organization: Default
