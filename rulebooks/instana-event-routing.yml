---
- name: Instana Event Driven Automation
  hosts: all
  sources:
    - ibm.instana.instana_webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    # Test: log all events
    - name: Log all Instana events
      condition: event.payload is defined
      action:
        run_playbook:
          name: playbooks/log-event.yml

    # Standard: process down -> restart
    - name: Process down - restart service
      condition: event.payload.message is match(".*process.*down.*", ignorecase=true)
      action:
        run_playbook:
          name: playbooks/notify-event.yml
          extra_vars:
            action_type: restart_service

    # Standard: disk usage high
    - name: Disk usage high - alert
      condition: event.payload.message is match(".*disk.*usage.*", ignorecase=true)
      action:
        run_playbook:
          name: playbooks/notify-event.yml
          extra_vars:
            action_type: disk_cleanup

    # AI-Driven: performance degradation
    - name: Performance degradation - AI analysis
      condition: >
        event.payload.message is match(".*erroneous call rate.*", ignorecase=true)
        or event.payload.message is match(".*response time.*", ignorecase=true)
        or event.payload.message is match(".*high latency.*", ignorecase=true)
      action:
        run_playbook:
          name: playbooks/notify-event.yml
          extra_vars:
            action_type: ai_analysis
